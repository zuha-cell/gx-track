<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0A0F1E"/>
<title>Guardian X — Live Emergency Tracker</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0A0F1E;color:#fff;display:flex;flex-direction:column;
    height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
  #header{background:linear-gradient(135deg,#B71C1C,#7F0000);
    padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .sos-badge{background:#FF1744;border-radius:6px;padding:4px 10px;
    font-weight:900;font-size:16px;letter-spacing:2px;flex-shrink:0;
    animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,23,68,.6)}
    70%{box-shadow:0 0 0 8px rgba(255,23,68,0)}}
  .info{flex:1;min-width:0}
  .info h1{font-size:14px;font-weight:800;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .info p{font-size:10px;opacity:.6;margin-top:1px}
  #map{flex:1;width:100%;min-height:0;position:relative}
  #loading{position:absolute;inset:0;background:#0D1B2A;
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;z-index:999}
  .spin{width:36px;height:36px;border:3px solid #1A2A3A;
    border-top:3px solid #4FC3F7;border-radius:50%;
    animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading p{margin-top:8px;font-size:12px;opacity:.5}
  #panel{background:#0D1B2A;padding:10px 12px;display:flex;
    flex-direction:column;gap:8px;flex-shrink:0;
    border-top:1px solid #1A2A3A;overflow-y:auto;max-height:55vh}
  .pcard{background:#1A0A0A;border:1.5px solid #C62828;
    border-radius:10px;padding:10px 12px}
  .nm{font-size:16px;font-weight:800;color:#EF5350}
  .ph{font-size:12px;color:#FFCDD2;margin-top:2px}
  .lc{font-size:11px;color:#90CAF9;margin-top:2px}
  .tm{font-size:10px;opacity:.4;margin-top:3px}
  .stats{display:flex;gap:6px}
  .stat{flex:1;background:#1A2A3A;border-radius:8px;
    padding:8px 6px;text-align:center}
  .slb{font-size:8px;text-transform:uppercase;
    letter-spacing:.8px;opacity:.4;margin-bottom:2px}
  .svl{font-size:18px;font-weight:800;color:#4FC3F7;line-height:1}
  .sun{font-size:9px;opacity:.45;margin-top:2px}
  .btn{width:100%;padding:12px;border-radius:10px;border:none;
    font-size:13px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px}
  .btn:active{opacity:.75}
  .bcall{background:#1B5E20;color:#fff}
  .bshare{background:#0D47A1;color:#fff}
  .bcome{background:#4A148C;color:#fff}
  .bmap{background:#1A2A3A;color:#4FC3F7;border:1px solid #2A3A4A}
  #status{background:#0A200A;border:1px solid #2E7D32;border-radius:8px;
    padding:8px 10px;font-size:12px;color:#C8E6C9;display:none;line-height:1.5}
  #errmsg{background:#1A0A0A;border:1px solid #B71C1C;border-radius:8px;
    padding:8px 10px;font-size:11px;color:#FFCDD2;display:none;text-align:center}
  .foot{text-align:center;font-size:10px;opacity:.2;padding:5px;flex-shrink:0}
  .foot a{color:#4A6070}
  /* Google Maps marker label */
  .gx-label{background:#D32F2F;color:#fff;font-size:10px;font-weight:800;
    padding:2px 6px;border-radius:4px;white-space:nowrap;
    position:absolute;top:-24px;left:50%;transform:translateX(-50%)}
</style>
</head>
<body>

<div id="header">
  <div class="sos-badge">SOS</div>
  <div class="info">
    <h1 id="h-title">Emergency Alert</h1>
    <p>Guardian X • Live Location</p>
  </div>
</div>

<div id="map">
  <div id="loading">
    <div class="spin"></div>
    <p>Loading map...</p>
  </div>
</div>

<div id="panel">
  <div class="pcard">
    <div class="nm" id="pc-name">Loading...</div>
    <div class="ph" id="pc-phone"></div>
    <div class="lc" id="pc-loc"></div>
    <div class="tm" id="pc-time"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="slb">Distance</div>
      <div class="svl" id="s-dist">—</div>
      <div class="sun" id="s-dunit">getting location</div>
    </div>
    <div class="stat">
      <div class="slb">Drive Est.</div>
      <div class="svl" id="s-eta">—</div>
      <div class="sun">minutes</div>
    </div>
    <div class="stat">
      <div class="slb">GPS Acc.</div>
      <div class="svl" id="s-acc">—</div>
      <div class="sun">metres</div>
    </div>
  </div>

  <div id="errmsg"></div>
  <div id="status"></div>

  <button class="btn bcall" id="btn-call" onclick="doCall()">
    📞 Call <span id="b-name">Now</span>
  </button>
  <button class="btn bshare" onclick="doShare()">
    📤 Send My Location to <span id="b-name2">Them</span>
  </button>
  <button class="btn bcome" onclick="doComing()">
    🚗 I Am Coming to Help
  </button>
  <button class="btn bmap" id="btn-gmaps" onclick="openGoogleMaps()">
    🗺 Open in Google Maps
  </button>
</div>

<div class="foot">
  Guardian X &nbsp;·&nbsp;
  <a href="privacy.html">Privacy</a>
</div>

<!-- Google Maps JS API — no API key needed for embed -->
<script>
const Q = new URLSearchParams(location.search);
const sLat  = parseFloat(Q.get('lat')  || '0');
const sLng  = parseFloat(Q.get('lng')  || '0');
const sName = decodeURIComponent(Q.get('name')  || 'Emergency');
const sPh   = decodeURIComponent(Q.get('phone') || '');
const sTime = decodeURIComponent(Q.get('time')  || '');
const sAddr = decodeURIComponent(Q.get('addr')  || '');

document.title = sName + ' — Emergency SOS';
document.getElementById('h-title').textContent   = '🆘 ' + sName + ' needs help!';
document.getElementById('pc-name').textContent   = '🆘 ' + sName;
document.getElementById('b-name').textContent    = sName;
document.getElementById('b-name2').textContent   = sName;
if (sPh)   document.getElementById('pc-phone').textContent = '📱 ' + sPh;
if (sAddr) document.getElementById('pc-loc').textContent   = '📍 ' + sAddr;
if (sTime) document.getElementById('pc-time').textContent  = '⏱ Sent at ' + sTime;
if (!sPh)  document.getElementById('btn-call').style.display = 'none';

let gmap, sMarker, hMarker, myLat, myLng;

// Use Google Maps Embed API (no API key needed for basic embed)
// Then add markers via Maps JavaScript API with no key needed for basic usage
function initMap() {
  if (sLat === 0 && sLng === 0) {
    document.getElementById('loading').innerHTML =
      '<p style="color:#EF5350;padding:20px;text-align:center">⚠️ No location.<br>Call directly.</p>';
    return;
  }
  document.getElementById('loading').style.display = 'none';
  gmap = new google.maps.Map(document.getElementById('map'), {
    center: {lat: sLat, lng: sLng},
    zoom: 16,
    mapId: 'DEMO_MAP_ID',
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true,
    gestureHandling: 'greedy',
    styles: [
      {elementType:'geometry',stylers:[{color:'#0A1520'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#8ec3b9'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#1a3646'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#1A2A3A'}]},
      {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#0A1520'}]},
      {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#0D2137'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#0D1B2A'}]},
      {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]}
    ]
  });

  // Sender marker — red pulsing dot
  const senderDiv = document.createElement('div');
  senderDiv.style.cssText = 'width:22px;height:22px;background:#D32F2F;' +
    'border:3px solid #fff;border-radius:50%;' +
    'box-shadow:0 0 0 8px rgba(211,47,47,.25)';
  sMarker = new google.maps.marker.AdvancedMarkerElement({
    position: {lat: sLat, lng: sLng},
    map: gmap,
    title: sName,
    content: senderDiv
  });
  new google.maps.InfoWindow({content: '<b>🆘 ' + sName + '</b><br>Needs help here'})
    .open(gmap, sMarker);
}

// Load Google Maps — using no-API-key mode (limited but functional for basic maps)
function loadMaps() {
  // Try Maps Embed API first (no key needed)
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:100%;border:none';
  iframe.src = 'https://maps.google.com/maps?q=' + sLat + ',' + sLng +
    '&z=16&output=embed&t=m';
  iframe.onload = function() {
    document.getElementById('loading').style.display = 'none';
  };
  document.getElementById('map').appendChild(iframe);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('btn-gmaps').style.display = 'flex';
}

// Haversine distance
function haversine(a,b,c,d){
  const R=6371,r=Math.PI/180;
  const dL=(c-a)*r,dG=(d-b)*r;
  const x=Math.sin(dL/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function getMe(cb) {
  if (!navigator.geolocation) {
    show_err('Location not supported. Call ' + sName + ' directly.');
    return;
  }
  navigator.geolocation.getCurrentPosition(p => {
    myLat = p.coords.latitude; myLng = p.coords.longitude;
    const acc = Math.round(p.coords.accuracy);
    document.getElementById('s-acc').textContent = acc;
    if (sLat !== 0) {
      const d = haversine(myLat, myLng, sLat, sLng);
      document.getElementById('s-dist').textContent = d < 1 ? Math.round(d*1000) : d.toFixed(1);
      document.getElementById('s-dunit').textContent = d < 1 ? 'metres away' : 'km away';
      const eta = Math.round(d/30*60);
      document.getElementById('s-eta').textContent = eta < 1 ? '<1' : eta;
    }
    if (cb) cb();
  }, e => {
    const m = {1:'Access denied.',2:'Unavailable.',3:'Timed out.'};
    show_err((m[e.code]||'Error.') + ' Call ' + sName + ' directly.');
  }, {enableHighAccuracy:true,timeout:12000,maximumAge:0});
}

function show_err(t){const b=document.getElementById('errmsg');b.style.display='block';b.textContent='⚠️ '+t;}
function show_ok(t){const b=document.getElementById('status');b.style.display='block';b.innerHTML=t;}

function doCall(){ if(sPh) location.href='tel:'+sPh.replace(/\s/g,''); }

function openGoogleMaps(){
  const url = myLat
    ? 'https://maps.google.com/maps/dir/' + myLat + ',' + myLng + '/' + sLat + ',' + sLng
    : 'https://maps.google.com/?q=' + sLat + ',' + sLng;
  window.open(url, '_blank');
}

function doShare(){
  getMe(() => {
    const link = 'https://maps.google.com/?q=' + myLat + ',' + myLng;
    const msg  = '📍 I can see your SOS, ' + sName + '. My location:\n' + link + '\n\n— via Guardian X';
    if (sPh) {
      const n = sPh.replace(/[^0-9+]/g,'');
      window.open('https://api.whatsapp.com/send?phone=' + n + '&text=' + encodeURIComponent(msg), '_blank');
    }
    show_ok('✅ <b>Location shared with ' + sName + '</b>.');
  });
}

function doComing(){
  getMe(() => {
    const link = 'https://maps.google.com/?q=' + myLat + ',' + myLng;
    const msg  = '🚗 I AM COMING, ' + sName + '!\n\n📍 My location:\n' + link +
      '\n\nStay calm — I will reach you.\n\n— via Guardian X';
    if (sPh) location.href = 'sms:' + sPh.replace(/[^0-9+]/g,'') + '?body=' + encodeURIComponent(msg);
    show_ok('✅ <b>Message sent to ' + sName + '.</b>');
  });
}

// Auto-detect location on load
getMe(null);

// Load map
if (sLat !== 0 && sLng !== 0) {
  loadMaps();
} else {
  document.getElementById('loading').innerHTML =
    '<p style="color:#EF5350;padding:20px;text-align:center">⚠️ No location in link.<br>Please call directly.</p>';
  document.getElementById('loading').style.display = 'flex';
}
</script>
</body>
</html>
