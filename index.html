<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0A0F1E"/>
<title>Guardian X — Live Emergency Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0A0F1E;color:#fff;display:flex;flex-direction:column;
    height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
  #header{background:linear-gradient(135deg,#B71C1C,#7F0000);
    padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .sos-badge{background:#FF1744;border-radius:6px;padding:4px 10px;
    font-weight:900;font-size:16px;letter-spacing:2px;
    animation:pulse 1.2s ease-in-out infinite;flex-shrink:0}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,23,68,.6)}
    70%{box-shadow:0 0 0 8px rgba(255,23,68,0)}}
  #header .info{flex:1;min-width:0}
  #header h1{font-size:14px;font-weight:800;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap}
  #header p{font-size:10px;opacity:.65;margin-top:1px}
  #map{flex:1;width:100%;min-height:0}
  #loading{position:absolute;inset:0;background:#0D1B2A;
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;z-index:999}
  .spin{width:36px;height:36px;border:3px solid #1A2A3A;
    border-top:3px solid #4FC3F7;border-radius:50%;
    animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading p{margin-top:8px;font-size:12px;opacity:.5}
  #panel{background:#0D1B2A;padding:10px 12px;
    display:flex;flex-direction:column;gap:8px;
    flex-shrink:0;border-top:1px solid #1A2A3A;
    overflow-y:auto;max-height:55vh}
  .pcard{background:#1A0A0A;border:1.5px solid #C62828;
    border-radius:10px;padding:10px 12px}
  .pcard .nm{font-size:16px;font-weight:800;color:#EF5350}
  .pcard .ph{font-size:12px;color:#FFCDD2;margin-top:2px}
  .pcard .lc{font-size:11px;color:#90CAF9;margin-top:2px}
  .pcard .tm{font-size:10px;opacity:.4;margin-top:3px}
  .stats{display:flex;gap:6px}
  .stat{flex:1;background:#1A2A3A;border-radius:8px;
    padding:8px 6px;text-align:center}
  .stat .lb{font-size:8px;text-transform:uppercase;
    letter-spacing:.8px;opacity:.4;margin-bottom:2px}
  .stat .vl{font-size:18px;font-weight:800;color:#4FC3F7;line-height:1}
  .stat .un{font-size:9px;opacity:.45;margin-top:2px}
  .btn{width:100%;padding:12px;border-radius:10px;border:none;
    font-size:13px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px}
  .btn:active{opacity:.75}
  .call{background:#1B5E20;color:#fff}
  .share{background:#0D47A1;color:#fff}
  .come{background:#4A148C;color:#fff}
  #status{background:#0A200A;border:1px solid #2E7D32;border-radius:8px;
    padding:8px 10px;font-size:12px;color:#C8E6C9;display:none;line-height:1.5}
  #errmsg{background:#1A0A0A;border:1px solid #B71C1C;border-radius:8px;
    padding:8px 10px;font-size:11px;color:#FFCDD2;display:none;text-align:center}
  .foot{text-align:center;font-size:10px;opacity:.2;padding:6px;flex-shrink:0}
  .foot a{color:#4A6070}
</style>
</head>
<body>

<div id="header">
  <div class="sos-badge">SOS</div>
  <div class="info">
    <h1 id="h-title">Emergency Alert</h1>
    <p>Guardian X • Live Location Tracker</p>
  </div>
</div>

<div id="map" style="position:relative">
  <div id="loading"><div class="spin"></div><p>Loading map...</p></div>
</div>

<div id="panel">
  <div class="pcard">
    <div class="nm" id="pc-name">Loading...</div>
    <div class="ph" id="pc-phone"></div>
    <div class="lc" id="pc-loc"></div>
    <div class="tm" id="pc-time"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="lb">Distance</div>
      <div class="vl" id="s-dist">—</div>
      <div class="un" id="s-dunit">getting location</div>
    </div>
    <div class="stat">
      <div class="lb">Drive Est.</div>
      <div class="vl" id="s-eta">—</div>
      <div class="un">minutes</div>
    </div>
    <div class="stat">
      <div class="lb">Accuracy</div>
      <div class="vl" id="s-acc">—</div>
      <div class="un">metres</div>
    </div>
  </div>

  <div id="errmsg"></div>
  <div id="status"></div>

  <button class="btn call" id="btn-call" onclick="doCall()">
    📞 Call <span id="b-name">Now</span>
  </button>
  <button class="btn share" onclick="doShare()">
    📤 Send My Location to <span id="b-name2">Them</span>
  </button>
  <button class="btn come"  onclick="doComing()">
    🚗 I Am Coming to Help
  </button>
</div>

<div class="foot">
  Powered by Guardian X &nbsp;•&nbsp; Map © OpenStreetMap &nbsp;•&nbsp;
  <a href="privacy.html">Privacy Policy</a>
</div>

<script>
const Q  = new URLSearchParams(location.search);
const sLat  = parseFloat(Q.get('lat')  || '0');
const sLng  = parseFloat(Q.get('lng')  || '0');
const sName = decodeURIComponent(Q.get('name')  || 'Emergency');
const sPh   = decodeURIComponent(Q.get('phone') || '');
const sTime = decodeURIComponent(Q.get('time')  || '');
const sAddr = decodeURIComponent(Q.get('addr')  || '');

// Fill UI
document.title = sName + ' — Emergency SOS';
document.getElementById('h-title').textContent  = '🆘 ' + sName + ' needs help!';
document.getElementById('pc-name').textContent  = '🆘 ' + sName;
document.getElementById('b-name').textContent   = sName;
document.getElementById('b-name2').textContent  = sName;
if (sPh)   document.getElementById('pc-phone').textContent = '📱 ' + sPh;
if (sAddr) document.getElementById('pc-loc').textContent   = '📍 ' + sAddr;
if (sTime) document.getElementById('pc-time').textContent  = '⏱ Sent at ' + sTime;
if (!sPh)  document.getElementById('btn-call').style.display = 'none';

// Map
let map, sMarker, hMarker, myLat, myLng;
if (sLat !== 0 && sLng !== 0) {
  map = L.map('map',{zoomControl:true}).setView([sLat,sLng],15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
  document.getElementById('loading').style.display='none';
  const ri = L.divIcon({
    html:`<div style="width:22px;height:22px;background:#D32F2F;border:3px solid #fff;
      border-radius:50%;box-shadow:0 0 0 6px rgba(211,47,47,.3)"></div>
      <div style="position:absolute;top:-20px;left:50%;transform:translateX(-50%);
      background:#D32F2F;color:#fff;font-size:9px;font-weight:800;padding:2px 5px;
      border-radius:4px;white-space:nowrap">${sName}</div>`,
    iconSize:[22,22],iconAnchor:[11,11],className:''
  });
  sMarker = L.marker([sLat,sLng],{icon:ri}).addTo(map)
    .bindPopup('<b>🆘 ' + sName + '</b><br>Sent SOS from here');
} else {
  document.getElementById('loading').innerHTML =
    '<p style="color:#EF5350;padding:20px;text-align:center">⚠️ No location in link.<br>Call directly.</p>';
}

function haversine(a,b,c,d){
  const R=6371,r=Math.PI/180;
  const dL=(c-a)*r,dG=(d-b)*r;
  const x=Math.sin(dL/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function getMe(cb){
  if(!navigator.geolocation){show_err('Location not supported. Call ' + sName + ' directly.');return;}
  navigator.geolocation.getCurrentPosition(p=>{
    myLat=p.coords.latitude; myLng=p.coords.longitude;
    const acc=Math.round(p.coords.accuracy);
    document.getElementById('s-acc').textContent=acc;
    if(sLat!==0){
      const d=haversine(myLat,myLng,sLat,sLng);
      if(d<1){
        document.getElementById('s-dist').textContent=Math.round(d*1000);
        document.getElementById('s-dunit').textContent='metres away';
      } else {
        document.getElementById('s-dist').textContent=d.toFixed(1);
        document.getElementById('s-dunit').textContent='km away';
      }
      const eta=Math.round(d/30*60);
      document.getElementById('s-eta').textContent=eta<1?'<1':eta;
    }
    const bi=L.divIcon({
      html:`<div style="width:14px;height:14px;background:#1565C0;
        border:3px solid #fff;border-radius:50%"></div>`,
      iconSize:[14,14],iconAnchor:[7,7],className:''
    });
    if(hMarker&&map)map.removeLayer(hMarker);
    if(map){
      hMarker=L.marker([myLat,myLng],{icon:bi}).addTo(map)
        .bindPopup('<b>📍 You</b>');
      if(sLat!==0)
        map.fitBounds([[sLat,sLng],[myLat,myLng]],{padding:[50,50]});
    }
    if(cb)cb();
  },e=>{
    const m={1:'Location access denied.',2:'Location unavailable.',3:'Timed out.'};
    show_err((m[e.code]||'Location error.') + ' Please call ' + sName + ' directly.');
  },{enableHighAccuracy:true,timeout:12000,maximumAge:0});
}

function show_err(t){const b=document.getElementById('errmsg');b.style.display='block';b.textContent='⚠️ '+t;}
function show_ok(t){const b=document.getElementById('status');b.style.display='block';b.innerHTML=t;}

getMe(null);

function doCall(){if(sPh)location.href='tel:'+sPh.replace(/\s/g,'');}

function doShare(){
  getMe(()=>{
    const link='https://maps.google.com/?q='+myLat+','+myLng;
    const msg='📍 I can see your SOS, '+sName+'. My location:\n'+link+'\n\n— via Guardian X';
    if(sPh){
      const n=sPh.replace(/[^0-9+]/g,'');
      window.open('https://api.whatsapp.com/send?phone='+n+'&text='+encodeURIComponent(msg),'_blank');
    }
    show_ok('✅ <b>Location shared with '+sName+'</b> via WhatsApp.');
  });
}

function doComing(){
  getMe(()=>{
    const link='https://maps.google.com/?q='+myLat+','+myLng;
    const msg='🚗 I AM COMING TO HELP YOU, '+sName+'!\n\n📍 My location:\n'+link+
      '\n\nStay calm — I will reach you soon.\n\n— via Guardian X';
    if(sPh)location.href='sms:'+sPh.replace(/[^0-9+]/g,'')+'?body='+encodeURIComponent(msg);
    show_ok('✅ <b>Message sent to '+sName+'.</b> They can see your location.');
  });
}
</script>
</body>
</html>
